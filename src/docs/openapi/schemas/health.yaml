HealthData:
  type: object

  properties:
    status:
      type: string
      example: healthy

HealthResponse:
  type: object

  properties:
    success:
      type: boolean
      example: true

    message:
      type: string
      example: API is running successfully.

    data:
      $ref: "#/HealthData"

    errors:
      nullable: true
      example: null

    meta:
      nullable: true
      example: null

    timestamp:
      type: string
      format: date-time
      example: "2026-07-20T15:25:50.000Z"
