get:
  tags:
    - Health

  summary: API Health Check

  description: |
    Checks whether the HealthNest API is running.

    This endpoint is commonly used by:

      • Load balancers
      • Monitoring systems
      • Kubernetes probes
      • Mobile/Web applications

  operationId: getHealth

  responses:
    "200":
      description: API is running successfully.

      content:
        application/json:
          schema:
            $ref: "../schemas/common.yaml#/HealthResponse"

          example:
            success: true
            message: API is running.
            data:
              status: healthy
            errors: null
            meta: null
            timestamp: "2026-07-20T10:15:30.456Z"
