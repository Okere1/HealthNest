openapi: 3.1.0

info:
  title: HealthNest API
  version: 1.0.0
  description: HealthNest Backend REST API.

servers:
  - url: http://localhost:5000/api/v1
    description: Local Development

tags:
  - name: Authentication
  - name: Users
  - name: Health

paths:
  /health:
    $ref: "./paths/health.yaml"

  /users/register:
    $ref: "./paths/users.yaml"

  /auth/login:
    $ref: "./paths/auth.yaml#/login"

  /auth/me:
    $ref: "./paths/auth.yaml#/me"

components:
  schemas:
    ApiResponse:
      $ref: "./schemas/common.yaml#/ApiResponse"

    ErrorResponse:
      $ref: "./schemas/common.yaml#/ErrorResponse"

    RegisterRequest:
      $ref: "./schemas/user.yaml#/RegisterRequest"

    User:
      $ref: "./schemas/user.yaml#/User"

    LoginRequest:
      $ref: "./schemas/auth.yaml#/LoginRequest"

    LoginResponse:
      $ref: "./schemas/auth.yaml#/LoginResponse"

  securitySchemes:
    bearerAuth:
      $ref: "./security/bearer.yaml"
